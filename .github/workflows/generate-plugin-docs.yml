# Generate Plugin Docs
#
# On every push to main that touches the cofounder plugin, regenerates
# the PDF documentation and commits it back to the repository.

name: Generate Plugin Docs

on:
  push:
    branches: [main]
    paths:
      - "plugins/cofounder/**"
      - "!plugins/cofounder/docs/cofounder-plugin.pdf"

permissions:
  contents: write

jobs:
  generate-pdf:
    name: Generate PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r plugins/cofounder/docs/requirements.txt

      - name: Generate PDF
        run: python plugins/cofounder/docs/generate_pdf.py

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/cofounder/docs/cofounder-plugin.pdf
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "[skip ci] docs: regenerate cofounder plugin PDF"
          git push
